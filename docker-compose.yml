version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: mandaapp_db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: ${DB_NAME:-mandaapp_dev}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-mandaapp_dev}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
